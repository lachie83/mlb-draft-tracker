name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: python_app/requirements*.txt

      - name: Install dependencies
        working-directory: python_app
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        working-directory: python_app
        run: pytest tests/ -v

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dockerfile: [Dockerfile, Dockerfile.k8s]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Build ${{ matrix.dockerfile }}
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          tags: mlb-draft-tracker:ci
          push: false
          build-args: GIT_COMMIT=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.dockerfile }}
          cache-to: type=gha,mode=max,scope=${{ matrix.dockerfile }}

  k8s-manifests:
    name: Validate k8s manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5

      - name: Render kustomization (catches YAML/reference errors)
        run: kubectl kustomize k8s/ > /dev/null
