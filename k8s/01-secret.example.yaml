# TEMPLATE ONLY - do not fill in real values here and do not `kubectl apply`
# this file. It exists so the field names/structure are documented in git.
#
# Create the real Secret imperatively instead, so your bot token/chat id
# never touch a file on disk or get committed by accident:
#
#   kubectl create secret generic telegram-credentials \
#     --namespace mlb-draft-tracker \
#     --from-literal=TELEGRAM_BOT_TOKEN='<your-real-token>' \
#     --from-literal=TELEGRAM_CHAT_ID='<your-real-chat-id>'
#
# See docs/AKS_DEPLOYMENT.md for how to obtain these values.
apiVersion: v1
kind: Secret
metadata:
  name: telegram-credentials
  namespace: mlb-draft-tracker
type: Opaque
stringData:
  TELEGRAM_BOT_TOKEN: "REPLACE_ME"
  TELEGRAM_CHAT_ID: "REPLACE_ME"
