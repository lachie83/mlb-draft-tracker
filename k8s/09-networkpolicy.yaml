# Default-deny with explicit allows:
#   ingress: only from the ingress-nginx controller, on the app port
#   egress:  only DNS + HTTPS (needed for statsapi.mlb.com and
#            api.telegram.org, neither of which publishes a fixed IP range
#            to pin down further)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mlb-draft-tracker
  namespace: mlb-draft-tracker
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: mlb-draft-tracker
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8000
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
