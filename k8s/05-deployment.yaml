# Single-replica Deployment with two containers sharing one PVC:
#   - dashboard:  serves the read-only web UI (fronted by the Ingress)
#   - automation: runs pre_draft_sync.sh + poll_draft_day.sh continuously
#                 (see scripts/k8s_automation.sh), so nothing needs to be
#                 triggered by hand on draft day
#
# Kept to 1 replica deliberately: SQLite is single-writer and the PVC is
# ReadWriteOnce. Both containers run in the same pod (same node) so they
# can share that one volume safely. strategy=Recreate ensures Kubernetes
# never tries to start a second pod (and remount the RWO volume elsewhere)
# while the old one is still terminating during a rollout.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlb-draft-tracker
  namespace: mlb-draft-tracker
  labels:
    app.kubernetes.io/name: mlb-draft-tracker
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: mlb-draft-tracker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mlb-draft-tracker
    spec:
      serviceAccountName: mlb-draft-tracker
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: dashboard
          image: "<ACR_LOGIN_SERVER>/mlb-draft-tracker:<TAG>"
          args: ["python3", "dashboard.py", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: mlb-draft-tracker-config
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
        - name: automation
          image: "<ACR_LOGIN_SERVER>/mlb-draft-tracker:<TAG>"
          command: ["/app/scripts/k8s_automation.sh"]
          envFrom:
            - configMapRef:
                name: mlb-draft-tracker-config
            - secretRef:
                name: telegram-credentials
          env:
            - name: DRAFT_DB
              value: /app/data/mlb_draft_2026.db
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 384Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mlb-draft-tracker-data
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
